<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Center - Dream Reel</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/data.js" defer></script>
    <script src="js/app.js" defer></script>
</head>

<body data-page="profile">
<div class="app">

    <header class="page-header">
        <a class="back-link" href="Home.html" aria-label="Back to home">←</a>
        <div>
            <p class="eyebrow">DREAM REEL</p>
            <h1>Personal Center</h1>
        </div>
    </header>

    <main class="profile-main">
        <section class="user-card">
            <div class="avatar" id="profileAvatar">G</div>

            <div class="user-information">
                <h2 id="profileName">Guest User</h2>
                <p id="profileEmail">No email saved</p>
                <span class="membership-badge" id="membershipBadge">Free member</span>
            </div>
        </section>

        <section class="profile-stats">
            <a href="favorites.html">
                <strong id="favoriteStat">0</strong>
                <span>Favorites</span>
            </a>

            <div>
                <strong id="historyStat">0</strong>
                <span>Watched</span>
            </div>

            <div>
                <strong id="membershipStat">Free</strong>
                <span>Plan</span>
            </div>
        </section>

        <section class="panel">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">SIMULATED USER PROFILE</p>
                    <h2>Edit profile</h2>
                </div>
            </div>

            <form class="profile-form" id="profileForm">
                <label>
                    <span>Display name</span>
                    <input id="profileNameInput" type="text" maxlength="30" placeholder="Guest User">
                </label>

                <label>
                    <span>Email</span>
                    <input id="profileEmailInput" type="email" placeholder="name@example.com">
                </label>

                <button class="primary-button" type="submit">Save profile</button>
            </form>
        </section>

        <section class="panel">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">SETTINGS</p>
                    <h2>Account actions</h2>
                </div>
            </div>

            <div class="settings-list">
                <button class="settings-button" id="membershipButton" type="button">
                    <span>
                        <strong>Membership demo</strong>
                        <small>Switch between Free and Premium</small>
                    </span>
                    <span>›</span>
                </button>

                <button class="settings-button" id="themeButton" type="button">
                    <span>
                        <strong>Appearance</strong>
                        <small id="themeLabel">Switch to light mode</small>
                    </span>
                    <span>›</span>
                </button>

                <button class="settings-button" id="clearHistoryButton" type="button">
                    <span>
                        <strong>Clear watch history</strong>
                        <small>Remove all locally stored history</small>
                    </span>
                    <span>›</span>
                </button>

                <button class="settings-button danger" id="resetProfileButton" type="button">
                    <span>
                        <strong>Reset profile</strong>
                        <small>Return to the guest account</small>
                    </span>
                    <span>›</span>
                </button>
            </div>
        </section>

        <section class="panel">
            <div class="panel-heading">
                <div>
                    <p class="eyebrow">RECENT ACTIVITY</p>
                    <h2>Watch history</h2>
                </div>
            </div>

            <div class="history-list" id="historyList"></div>
        </section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
        <a class="nav-item" href="Home.html">
            <span class="nav-icon">⌂</span>
            <span>Home</span>
        </a>

        <a class="nav-item" href="discover.html">
            <span class="nav-icon">◉</span>
            <span>Discover</span>
        </a>

        <a class="nav-item" href="favorites.html">
            <span class="nav-icon">♡</span>
            <span>Favorites</span>
        </a>

        <a class="nav-item active" href="profile.html">
            <span class="nav-icon">♙</span>
            <span>Profile</span>
        </a>
    </nav>

</div>
</body>
</html>
