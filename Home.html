<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Reel</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/data.js" defer></script>
    <script src="js/app.js" defer></script>
</head>

<body data-page="home">
<div class="app">

    <section class="hero" id="hero">
        <div class="top-bar">
            <a class="logo" href="Home.html">DREAM REEL</a>
            <a class="profile-button" href="profile.html">Personal Center</a>
        </div>

        <div class="hero-content">
            <h1 id="heroTitle">All Short Dramas</h1>
            <p id="heroText">
                Discover wonderful short dramas and enjoy them anytime, anywhere.
            </p>

            <div class="slider-dots" aria-label="Banner selector">
                <button class="slider-dot active" type="button" data-slide="0" aria-label="Banner 1"></button>
                <button class="slider-dot" type="button" data-slide="1" aria-label="Banner 2"></button>
                <button class="slider-dot" type="button" data-slide="2" aria-label="Banner 3"></button>
            </div>
        </div>
    </section>

    <main>
        <section class="search-wrapper" aria-label="Search dramas">
            <label class="search-box" for="homeSearch">
                <span class="search-icon">⌕</span>
                <input
                    id="homeSearch"
                    type="search"
                    placeholder="Search for short drama titles..."
                    autocomplete="off"
                >
            </label>
        </section>

        <section class="tabs" aria-label="Drama type">
            <button class="tab active" type="button" data-type="short-drama">
                SHORT DRAMA
            </button>
            <button class="tab" type="button" data-type="interactive">
                INTERACTIVE
            </button>
        </section>

        <section class="section-header">
            <h2 id="homeSectionTitle">Popular Now</h2>
            <a href="discover.html">View all</a>
        </section>

        <section class="drama-grid" id="homeGrid" aria-live="polite"></section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
        <a class="nav-item active" href="Home.html">
            <span class="nav-icon">⌂</span>
            <span>Home</span>
        </a>

        <a class="nav-item" href="discover.html">
            <span class="nav-icon">◉</span>
            <span>Discover</span>
        </a>

        <a class="nav-item" href="favorites.html">
            <span class="nav-icon">♡</span>
            <span>Favorites</span>
        </a>

        <a class="nav-item" href="profile.html">
            <span class="nav-icon">♙</span>
            <span>Profile</span>
        </a>
    </nav>

</div>
</body>
</html>
