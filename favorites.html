<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites - Dream Reel</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/data.js" defer></script>
    <script src="js/app.js" defer></script>
</head>

<body data-page="favorites">
<div class="app">

    <header class="page-header">
        <a class="back-link" href="Home.html" aria-label="Back to home">←</a>

        <div class="header-title-wrap">
            <p class="eyebrow">YOUR LIBRARY</p>
            <h1>Favorites</h1>
        </div>

        <button class="text-button" id="clearFavoritesButton" type="button">
            Clear
        </button>
    </header>

    <main>
        <section class="empty-state hidden" id="favoritesEmpty">
            <div class="empty-icon">♡</div>
            <h2>No favorites yet</h2>
            <p>Add dramas to your favorites from the player page.</p>
            <a class="primary-link-button" href="discover.html">Discover dramas</a>
        </section>

        <section class="section-header" id="favoritesHeader">
            <h2>Saved Dramas</h2>
            <span class="result-count" id="favoritesCount">0 saved</span>
        </section>

        <section class="drama-grid" id="favoritesGrid"></section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
        <a class="nav-item" href="Home.html">
            <span class="nav-icon">⌂</span>
            <span>Home</span>
        </a>

        <a class="nav-item" href="discover.html">
            <span class="nav-icon">◉</span>
            <span>Discover</span>
        </a>

        <a class="nav-item active" href="favorites.html">
            <span class="nav-icon">♡</span>
            <span>Favorites</span>
        </a>

        <a class="nav-item" href="profile.html">
            <span class="nav-icon">♙</span>
            <span>Profile</span>
        </a>
    </nav>

</div>
</body>
</html>
